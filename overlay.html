<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sylox · floating predictor</title>
<style>
  :root{--good:#22c08a;--bad:#ef5d44;--steel:#5b8bd0;--mut:#9fb2c4;--faint:#6b8095;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{background:transparent}
  body{font-family:var(--mono);color:#eaf1f8;padding:5px}
  .ov{max-width:340px;margin:0 auto;background:rgba(11,17,24,.82);border:1px solid rgba(91,139,208,.45);
    border-radius:13px;backdrop-filter:blur(2px);box-shadow:0 6px 22px rgba(0,0,0,.5);overflow:hidden}
  .bar{display:flex;align-items:center;gap:6px;padding:6px 9px;background:rgba(15,25,37,.9);
    border-bottom:1px solid rgba(91,139,208,.25);font-size:11px;letter-spacing:.04em;color:var(--steel);font-weight:600}
  .bar .grip{color:var(--faint);font-weight:400}
  .bar .st{margin-left:auto;color:var(--mut);font-weight:400;font-size:10.5px}
  .bar .x{background:rgba(40,30,30,.8);border:1px solid rgba(239,93,68,.4);color:#ff9d8b;
    width:22px;height:22px;border-radius:7px;font-size:14px;line-height:1;cursor:pointer}
  .body{padding:8px 9px 9px}
  .prow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
  .prow .lab{font-size:9.5px;letter-spacing:.08em;color:var(--faint);min-width:26px}
  .chips{display:flex;gap:4px;flex-wrap:wrap;flex:1}
  .opct{font-size:10px;font-weight:700;color:var(--mut);white-space:nowrap;min-width:30px;text-align:right}
  .opct small{font-size:8px;font-weight:400;color:var(--faint);display:block;line-height:1}
  .trust{font-size:9.5px;color:var(--mut);margin:0 0 5px;line-height:1.35}
  .trust .tlab{font-size:8px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;margin-right:5px}
  .trust b{font-weight:800}
  .trust small{opacity:.65;font-size:8.5px}
  .chip{font-size:13px;font-weight:700;min-width:24px;text-align:center;padding:3px 4px;border-radius:6px}
  .chip small{display:block;font-size:8px;font-weight:600;opacity:.7;line-height:1;margin-top:1px}
  .old .chip{background:#22120f;border:1px solid rgba(239,93,68,.55);color:#ff9d8b}
  .new .chip{background:#0f2018;border:1px solid rgba(34,192,138,.55);color:#7fe3c0}
  .status{font-size:11px;margin:6px 0 4px;min-height:15px;color:var(--mut);line-height:1.35}
  .status .hit{color:var(--good);font-weight:700}
  .status .miss{color:var(--bad);font-weight:700}
  .recent{display:flex;align-items:center;gap:4px;margin-bottom:7px;font-size:10px;color:var(--faint)}
  .recent .rl{letter-spacing:.06em}
  .recent .rv{min-width:19px;text-align:center;padding:2px 4px;border-radius:4px;
    background:rgba(13,23,34,.9);border:1px solid rgba(91,139,208,.2);color:var(--mut)}
  .recent .rv.h{border-color:rgba(34,192,138,.5);color:var(--good)}
  .recent .rv.now{outline:1.5px solid var(--steel)}
  .pad{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .pad .n{font-size:13px;font-weight:600;padding:8px 0;border-radius:7px;background:rgba(22,33,47,.92);
    border:1px solid rgba(91,139,208,.3);color:#eaf1f8;cursor:pointer;transition:.08s}
  .pad .n:active{background:var(--steel);color:#06121f;transform:scale(.94)}
  .modeRow{display:flex;align-items:center;gap:6px;margin:2px 0 4px}
  .modeRow .elab{font-size:9.5px;color:var(--faint);flex:0 0 auto}
  .modeRow .reelPicks{flex:1;font-size:12px;color:#ff9d8b;font-weight:700}
  .modeRow .reelPicks .dim{color:var(--faint);font-weight:400}
  .modeRow #modeBtn{flex:0 0 auto;font-size:9.5px;padding:4px 7px}
  .miniBtns{display:flex;gap:5px;margin-top:7px}
  .mini{flex:1;font-size:10px;padding:5px 0;border-radius:6px;background:rgba(15,25,37,.85);
    border:1px solid rgba(91,139,208,.25);color:var(--mut);cursor:pointer;text-align:center}
  .err{color:var(--bad);font-size:11px;padding:10px}
  .syncRow{display:flex;gap:5px;margin-top:6px}
  .syncRow input{flex:1;min-width:0;background:rgba(13,23,34,.9);border:1px solid rgba(91,139,208,.3);
    color:#eaf1f8;font-family:var(--mono);font-size:11px;padding:6px 7px;border-radius:6px;outline:none}
</style>
</head>
<body>
<div class="ov" id="ov">
  <div class="bar" id="bar">
    <span class="grip">⋮⋮</span> SYLOX <span class="st" id="st"></span>
    <button class="x" id="x" title="close">×</button>
  </div>
  <div class="body">
    <div class="prow old"><span class="lab">OLD&nbsp;7</span><span class="chips" id="old"></span><span class="opct" id="oldPct" title="how often the actual result landed in our 7"></span></div>
    <div class="prow new"><span class="lab">NEW&nbsp;4</span><span class="chips" id="new"></span></div>
    <div class="trust" id="trust"></div>
    <div class="status" id="status">Tap the result that came up on the game.</div>
    <div class="recent" id="recent"></div>
    <div class="modeRow"><span class="elab" id="entryLab">tap the result (0–27)</span><span class="reelPicks" id="reelPicks"></span><div class="mini" id="modeBtn">3-digit entry</div></div>
    <div class="pad" id="pad"></div>
    <div class="miniBtns">
      <div class="mini" id="sync">⇅ sync</div>
      <div class="mini" id="undo">undo</div>
      <div class="mini" id="exp">export</div>
      <div class="mini" id="imp">import</div>
      <div class="mini" id="open">full ↗</div>
    </div>
    <div class="syncRow" id="syncRow" style="display:none">
      <input id="syncCode" placeholder="sync code — same on both devices" autocomplete="off" autocapitalize="off" spellcheck="false">
      <div class="mini" id="syncGo">connect</div>
    </div>
    <input type="file" id="impFile" accept="application/json" hidden>
  </div>
</div>
<script src="engine.js"></script>
<script src="sync.js"></script>
<script>
/* compact floating predictor — shares the sylox_livetest_v2 test with the full tool */
const LS='sylox_livetest_v2', K_OLD=7, K_NEW=4, CONF_THR=0.15;   // CONF_THR = "the engine is sure" cutoff for the trust meter
const BASE8set=new Set(topK(PRIOR,K_OLD));
const $=id=>document.getElementById(id);
const dayKey=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();};
let P=null, cur=null;

function fresh(){ return {v:2,created:Date.now(),mode:'sum',Hold:[],Hnew:[],reels:[],
  Wold:newWeights(),Wnew:newWeights(),Wr:[newWeights(),newWeights(),newWeights()],
  oH:0,oR:0,bH:0,nH:0,nR:0,streak:0,best:0,days:{},lastTs:null,rounds:[],lastExport:0,
  t1N:0,t1Hit:0,t1SumP:0,cHiN:0,cHiHit:0,shN:0,shH:0,   // trust meter + shadow (full-engine hits, drives do-no-harm)
  seed:'player-'+Math.floor(Math.random()*1e9).toString(36)}; }
// record one round's top-pick confidence + whether it landed (prequential: pred was made before the result)
function trackTrust(o,pool,actual){ if(o.Hold.length<12||!pool) return;
  const t1=topK(pool,1)[0], t1p=pool[t1];
  o.t1N=(o.t1N||0)+1; o.t1SumP=(o.t1SumP||0)+t1p; if(t1===actual)o.t1Hit=(o.t1Hit||0)+1;
  if(t1p>=CONF_THR){ o.cHiN=(o.cHiN||0)+1; if(t1===actual)o.cHiHit=(o.cHiHit||0)+1; } }
// "DO NO HARM": bet the central baseline until the engine's SHADOW (its full prediction, tracked
// but not bet) proves a validated edge over baseline; then trust it proportionally. Guarantees we
// never sit below the ~54% central-7 baseline on structureless data, yet auto-upgrades on real edge.
function trustK(s){ const sN=s.shN||0; if(sN<50) return 0;                  // need evidence first
  const sRate=(s.shH||0)/sN, bRate=s.oR?(s.bH/s.oR):0;
  return Math.max(0, Math.min(1, ((sRate-bRate)-0.005)/0.045)); }           // ramp 0..1 as edge goes ~0.5%->5%
function blendBet(full,s){ const k=trustK(s);
  const pool=(full.pool&&typeof PRIOR!=='undefined')?full.pool.map((v,i)=>(1-k)*PRIOR[i]+k*(isFinite(v)?v:PRIOR[i])):full.pool;
  return {list:topK(pool,K_OLD), pool, fullPool:full.pool, dists:full.dists, fullList:full.list, k}; }
function load(){ try{const s=JSON.parse(localStorage.getItem(LS));
  if(s&&s.v===2){ if(!s.rounds)s.rounds=[]; if(s.lastExport==null)s.lastExport=0;
    if(!s.Wold)s.Wold=newWeights(); if(!s.Wnew)s.Wnew=newWeights(); return s; } }catch(e){} return fresh(); }
function save(){ try{localStorage.setItem(LS,JSON.stringify(P));}catch(e){}
  try{ if(window.SYLOX_SYNC&&SYLOX_SYNC.active()) SYLOX_SYNC.pushSoon(); }catch(e){} }

function chips(arr,el){ $(el).innerHTML=arr.slice().sort((a,b)=>a-b).map(n=>`<span class="chip">${n}</span>`).join(''); }
// like chips() but shows each number's model probability (confidence) underneath it
function chipsP(arr,pool,el){ $(el).innerHTML=arr.slice().sort((a,b)=>a-b).map(n=>{
  const p=(pool&&isFinite(pool[n]))?Math.round(pool[n]*100):0;
  return `<span class="chip">${n}<small>${p}%</small></span>`; }).join(''); }
function lockRound(){
  const full=predict(P.Hold,P.Wold,K_OLD);
  cur={ old:blendBet(full,P), nw:predict(P.Hnew,P.Wnew,K_NEW), fair:fairRound(P.seed,P.Hnew.length) };
  render();
}
function resolve(actual, reels){
  const oldHit=cur.old.list.indexOf(actual)>=0; P.oR++; if(oldHit)P.oH++; if(BASE8set.has(actual))P.bH++;
  if(P.Hold.length>=12){ P.shN=(P.shN||0)+1; if(cur.old.fullList.indexOf(actual)>=0)P.shH=(P.shH||0)+1; }  // shadow: would the full engine have hit?
  trackTrust(P, cur.old.fullPool, actual);
  updateWeights(P.Wold,cur.old.dists,actual,K_OLD); P.Hold.push(actual);
  const res=cur.fair.result, ok=fairVerify(cur.fair), newHit=cur.nw.list.indexOf(res)>=0;
  P.nR++; if(newHit)P.nH++; updateWeights(P.Wnew,cur.nw.dists,res,K_NEW); P.Hnew.push(res);
  P.streak=oldHit?P.streak+1:0; if(P.streak>P.best)P.best=P.streak;
  const ts=Date.now(); P.lastTs=ts; const dk=dayKey(ts);
  const dd=P.days[dk]||(P.days[dk]={oH:0,oR:0,bH:0}); dd.oR++; if(oldHit)dd.oH++; if(BASE8set.has(actual))dd.bH++;
  P.rounds.push({t:ts,s:actual,r:reels||null,oh:oldHit,nr:res,nh:newHit});
  P._last={actual,oldHit,res,newHit,ok};
  save(); lockRound();
}
// Deterministically rebuild the full state by replaying a timestamped round log.
// This is the single source of truth used by both undo and cross-device merge.
function rebuildFrom(rounds, seed, created){
  const np=fresh(); np.seed=seed; np.created=created;
  for(const e of rounds){
    if(e.seed) continue;   // warm-up/seed rounds retired: dropped on every rebuild so they can never re-enter via sync
    const full=predict(np.Hold,np.Wold,K_OLD); const c={ old:blendBet(full,np), nw:predict(np.Hnew,np.Wnew,K_NEW) };
    const oh=c.old.list.indexOf(e.s)>=0; np.oR++; if(oh)np.oH++; if(BASE8set.has(e.s))np.bH++;
    if(np.Hold.length>=12){ np.shN=(np.shN||0)+1; if(full.list.indexOf(e.s)>=0)np.shH=(np.shH||0)+1; }
    trackTrust(np, full.pool, e.s);
    updateWeights(np.Wold,full.dists,e.s,K_OLD); np.Hold.push(e.s);
    const nh=c.nw.list.indexOf(e.nr)>=0; np.nR++; if(nh)np.nH++;
    updateWeights(np.Wnew,c.nw.dists,e.nr,K_NEW); np.Hnew.push(e.nr);
    np.streak=oh?np.streak+1:0; if(np.streak>np.best)np.best=np.streak;
    const dk=dayKey(e.t); const dd=np.days[dk]||(np.days[dk]={oH:0,oR:0,bH:0}); dd.oR++; if(oh)dd.oH++; if(BASE8set.has(e.s))dd.bH++;
    np.rounds.push(e);
  }
  return np;
}
// Union two round logs, keyed by timestamp, ordered chronologically. No round is ever lost.
function mergeRounds(a,b){
  const m=new Map();
  for(const e of (a||[])) if(e&&e.t!=null) m.set(e.t,e);
  for(const e of (b||[])) if(e&&e.t!=null && !m.has(e.t)) m.set(e.t,e);
  return [...m.values()].sort((x,y)=>x.t-y.t);
}
function undo(){
  if(!P.rounds.length) return;
  const np=rebuildFrom(P.rounds.slice(0,-1), P.seed, P.created);
  np.lastExport=Math.min(P.lastExport,np.oR);
  P=np; P._last=null; save(); lockRound();
}
// TRUST METER — is the engine's confidence EARNED? When it is >=15% sure on its single
// top number, how often does that number actually come up? On fair data this stays ~7%
// (false confidence); when a real pattern exists it climbs well above the ~7.5% fair top-1.
function renderTrust(){
  const t=$('trust'); if(!t) return;
  const hiN=P.cHiN||0, hiH=P.cHiHit||0;
  if(hiN<8){ t.innerHTML=`<span class="tlab">trust</span> building… <small>${hiN}/8 confident calls</small>`; t.style.color='var(--faint)'; return; }
  const y=Math.round(hiH/hiN*100), claim=P.t1N?Math.round(P.t1SumP/P.t1N*100):0;
  t.innerHTML=`<span class="tlab">trust</span> ≥15% sure → lands <b>${y}%</b> <small>(${hiH}/${hiN} · top pick claims ~${claim}%)</small>`;
  const k=trustK(P);   // override the line above with the do-no-harm bet mode (this runs last, so it wins)
  if(k<=0){ t.innerHTML=`<span class="tlab">safe</span> betting central-7 baseline <small>(engine not beating it yet; lands ${Math.round(hiH/hiN*100)}% when sure)</small>`; t.style.color='var(--mut)'; }
  else { t.innerHTML=`<span class="tlab">edge ${Math.round(k*100)}%</span> blending in the engine <small>(${hiH}/${hiN} confident hits)</small>`; t.style.color='#7fe3c0'; }
}
function render(){
  chipsP(cur.old.list,cur.old.pool,'old'); chips(cur.nw.list,'new');
  const o=P.oR?Math.round(P.oH/P.oR*100):0, b=P.oR?Math.round(P.bH/P.oR*100):0;
  $('st').textContent=`${P.oR}r · ${o}% (base ${b}%) · ✦${P.streak}`;
  const op=$('oldPct');
  if(op){ if(P.oR){ op.innerHTML=`${o}%<small>${P.oH}/${P.oR} hit</small>`;
      op.style.color = o>=b ? '#7fe3c0' : (o>=b-4 ? '#ffd27f' : '#ff9d8b'); }   // green=beats baseline, amber=near, red=below
    else { op.innerHTML='<small>—</small>'; op.style.color=''; } }
  renderTrust();
  const L=P._last;
  $('status').innerHTML = L
    ? (L.oldHit?`<span class="hit">✓ HIT</span> — ${L.actual} was in OUR 7. `:`<span class="miss">✗ miss</span> — result ${L.actual}. `)
      + `Sylox: ${L.res} ${L.newHit?'(chance hit)':'<span class="hit">evaded</span>'}.`
    : 'Tap the result that came up on the game.';
  const rec=P.rounds.slice(-5);
  $('recent').innerHTML='<span class="rl">recent →</span>'+rec.map((e,i)=>
    `<span class="rv${e.oh?' h':''}${i===rec.length-1?' now':''}">${e.s}</span>`).join('') || '';
}
let reelPick=[];
function buildPad(){
  if(P.mode==='reels'){ buildReelPad(); return; }
  let h=''; for(let n=0;n<=27;n++) h+=`<button class="n" data-n="${n}">${n}</button>`;
  $('pad').innerHTML=h; $('pad').querySelectorAll('.n').forEach(b=>b.onclick=()=>resolve(+b.dataset.n));
  if($('entryLab')){ $('entryLab').textContent='tap the result (0–27)'; $('reelPicks').innerHTML=''; $('modeBtn').textContent='3-digit entry'; }
}
function buildReelPad(){
  let h=''; for(let d=0;d<=9;d++) h+=`<button class="n d" data-d="${d}">${d}</button>`;
  $('pad').innerHTML=h; $('pad').querySelectorAll('.d').forEach(b=>b.onclick=()=>pickDigit(+b.dataset.d));
  $('modeBtn').textContent='sum entry'; renderReelPicks();
}
function renderReelPicks(){ if(!$('reelPicks'))return;
  $('entryLab').textContent='tap the 3 reel digits as they land';
  $('reelPicks').innerHTML = reelPick.length
    ? reelPick.join(' + ') + (reelPick.length<3 ? ' <span class="dim">…</span>' : ' = '+reelPick.reduce((a,b)=>a+b,0))
    : '<span class="dim">digit 1 · 2 · 3</span>';
}
function pickDigit(d){ reelPick.push(d);
  if(reelPick.length>=3){ const r=reelPick.slice(0,3); reelPick=[]; resolve(r[0]+r[1]+r[2], r); renderReelPicks(); }
  else renderReelPicks();
}
function toggleMode(){ P.mode = (P.mode==='reels')?'sum':'reels'; reelPick=[]; save(); buildPad(); }

$('x').onclick=()=>{ try{ if(window.SyloxNative&&SyloxNative.close) SyloxNative.close(); }catch(e){} };
$('undo').onclick=undo;
$('modeBtn').onclick=toggleMode;
$('open').onclick=()=>{ try{ if(window.SyloxNative&&SyloxNative.openFull) SyloxNative.openFull();
  else window.open('fairness_demo.html','_blank'); }catch(e){ location.href='fairness_demo.html'; } };

// export / import — share the saved test with the browser tool (and across devices)
function exportData(){
  const json=JSON.stringify(P);
  try{ if(window.SyloxNative&&SyloxNative.share){ SyloxNative.share(json); P.lastExport=P.oR; save(); return; } }catch(e){}
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='sylox-livetest-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  P.lastExport=P.oR; save();
}
window.__sxImport=function(jsonStr){
  try{ const s=JSON.parse(jsonStr);
    if(s&&s.v===2){ if(!s.rounds)s.rounds=[]; if(s.lastExport==null)s.lastExport=0;
      if(!s.Wold)s.Wold=newWeights(); if(!s.Wnew)s.Wnew=newWeights();
      P=s; save(); lockRound(); return true; } }catch(e){}
  return false;
};
$('exp').onclick=exportData;
$('imp').onclick=()=>{ try{ if(window.SyloxNative&&SyloxNative.importFile){ SyloxNative.importFile(); return; } }catch(e){} $('impFile').click(); };
$('impFile').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>window.__sxImport(r.result); r.readAsText(f); };

// ---- live cross-device sync (Firebase Realtime DB) ----
// MERGE, never replace: take the union of this device's rounds and the remote's, then
// replay to rebuild. So two phones / phone+PC converge to the COMBINED history and a
// round entered on either device can never wipe the other's data.
function applyRemote(s){
  if(!s || s.v!==2 || !Array.isArray(s.rounds)) return;
  const localN=(P.rounds||[]).length, remoteN=s.rounds.length;
  const merged=mergeRounds(P.rounds, s.rounds);
  if(merged.length===localN && remoteN<=localN) return;        // remote brought nothing new
  const np=rebuildFrom(merged, P.seed||s.seed, Math.min(P.created||Date.now(), s.created||Date.now()));
  np.lastExport=Math.min(P.lastExport||0, np.oR); np.mode=P.mode||s.mode||'sum'; np._last=P._last;
  const weContributed = merged.length > remoteN;               // we had rounds the remote lacked
  P=np; try{localStorage.setItem(LS,JSON.stringify(P));}catch(e){}
  lockRound();
  if(weContributed){ try{ if(SYLOX_SYNC.active()) SYLOX_SYNC.pushSoon(); }catch(e){} }  // push the superset back
}
function syncStatus(st){ const b=$('sync'); if(!b)return;
  if(!SYLOX_SYNC.active()){ b.textContent='⇅ sync'; b.style.color=''; if($('syncGo'))$('syncGo').textContent='connect'; return; }
  const m={connecting:'⇅ …',synced:'⇅ on',pulled:'⇅ ✓',err:'⇅ !',offline:'⇅ ?'};
  b.textContent=m[st]||'⇅ on'; b.style.color=(st==='err'||st==='offline')?'#ffd27f':'#7fe3c0';
  if($('syncGo'))$('syncGo').textContent='stop'; }
// In the Android overlay the window is not-focusable (so it doesn't grab the game's touches),
// which also blocks the keyboard. Ask the native shell to make it focusable while typing the code.
function nativeIme(on){ try{ if(window.SyloxNative&&SyloxNative.imeFocus) SyloxNative.imeFocus(!!on); }catch(e){} }
$('sync').onclick=()=>{ const r=$('syncRow'); const show=r.style.display==='none'; r.style.display=show?'flex':'none';
  if(show){ if(!$('syncCode').value) $('syncCode').value=SYLOX_SYNC.savedCode()||'';
    nativeIme(true); setTimeout(()=>{ try{$('syncCode').focus();}catch(e){} },60); }
  else nativeIme(false); };
$('syncGo').onclick=()=>{ if(SYLOX_SYNC.active()){ SYLOX_SYNC.disable(); syncStatus('off'); $('syncRow').style.display='none'; nativeIme(false); return; }
  const c=$('syncCode').value.trim(); if(!c)return; SYLOX_SYNC.enable(c,()=>P,applyRemote,syncStatus); $('syncRow').style.display='none'; nativeIme(false); };
$('syncCode').addEventListener('keydown',e=>{ if(e.key==='Enter') $('syncGo').click(); });
if(SYLOX_SYNC.savedCode()) SYLOX_SYNC.enable(SYLOX_SYNC.savedCode(),()=>P,applyRemote,syncStatus);

// when embedded in the Android overlay shell (?app=1) the native bar provides drag+close
const EMBED=new URLSearchParams(location.search).has('app');
if(EMBED){ $('bar').style.display='none'; document.body.style.padding='0'; document.documentElement.style.background='transparent'; }
// report our height to the native shell so the floating window hugs the content (no dead-zone)
function reportHeight(){ try{ if(window.SyloxNative&&SyloxNative.resize){
  SyloxNative.resize(Math.ceil(document.getElementById('ov').getBoundingClientRect().height)); } }catch(e){} }
const _render=render; render=function(){ _render(); requestAnimationFrame(reportHeight); };

try{ P=load();
  // self-clean + backfill: drop seed rounds, and (re)compute the trust meter from history if it's missing
  if(P.rounds&&(P.rounds.some(r=>r&&r.seed)||P.t1N==null||P.shN==null)){ P=rebuildFrom(P.rounds.filter(r=>!(r&&r.seed)),P.seed,P.created); save(); }
  // a test shared TO the Android app (via the share sheet) arrives here on open
  try{ if(window.SyloxNative&&SyloxNative.pendingImport){ const pend=SyloxNative.pendingImport(); if(pend) window.__sxImport(pend); } }catch(e){}
  buildPad(); lockRound(); reportHeight(); }
catch(e){ document.body.innerHTML='<div class="err">overlay error: '+e.message+'</div>'; }
</script>
</body>
</html>
