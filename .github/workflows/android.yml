name: Build Android APK

# Builds only when the native app changes — the web UI (overlay.html / engine.js)
# updates live via GitHub Pages and needs no rebuild.
on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/sylox-release.jks"

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/sylox-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: cp android/app/build/outputs/apk/release/app-release.apk sylox-predictor.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sylox-predictor-apk
          path: sylox-predictor.apk

      - name: Publish APK to a Release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: Sylox Predictor — latest APK
          body: |
            Floating-window live predictor for Android. Sideload + "Install unknown apps", then
            grant "Display over other apps". The prediction UI updates automatically from GitHub Pages.
          prerelease: true
          files: sylox-predictor.apk
